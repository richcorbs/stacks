<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#000000"/>
  <!-- Inner rounded square -->
  <rect x="56" y="56" width="400" height="400" rx="20" fill="none" stroke="#ffffff" stroke-width="8"/>
  <!-- Vertical divider -->
  <line x1="256" y1="56" x2="256" y2="456" stroke="#ffffff" stroke-width="8"/>
  <!-- Horizontal divider -->
  <line x1="56" y1="256" x2="456" y2="256" stroke="#ffffff" stroke-width="8"/>
  <!-- Thick bar in bottom of top-left quadrant -->
  <rect x="80" y="206" width="152" height="30" rx="2" fill="#bbbbbb"/>
  <!-- Thick bar in bottom of top-right quadrant -->
  <rect x="280" y="206" width="152" height="30" rx="2" fill="#bbbbbb"/>
  <!-- Thick bar in bottom of bottom-left quadrant -->
  <rect x="80" y="406" width="152" height="30" rx="2" fill="#bbbbbb"/>
  <!-- Thick bar in bottom of bottom-right quadrant -->
  <rect x="280" y="406" width="152" height="30" rx="2" fill="#bbbbbb"/>
</svg>