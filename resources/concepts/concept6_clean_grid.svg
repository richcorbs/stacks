<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#000000"/>
  <!-- Inner rounded square -->
  <rect x="56" y="56" width="400" height="400" rx="20" fill="none" stroke="#ffffff" stroke-width="8"/>
  <!-- Vertical divider -->
  <line x1="256" y1="56" x2="256" y2="456" stroke="#ffffff" stroke-width="8"/>
  <!-- Horizontal divider -->
  <line x1="56" y1="256" x2="456" y2="256" stroke="#ffffff" stroke-width="8"/>
  <!-- Two horizontal lines in bottom 5th of top-left quadrant -->
  <line x1="80" y1="206" x2="232" y2="206" stroke="#bbbbbb" stroke-width="4"/>
  <line x1="80" y1="232" x2="232" y2="232" stroke="#bbbbbb" stroke-width="4"/>
  <rect x="84" y="212" width="7" height="14" fill="#bbbbbb"/>
  <!-- Two horizontal lines in bottom 5th of top-right quadrant -->
  <line x1="280" y1="206" x2="432" y2="206" stroke="#bbbbbb" stroke-width="4"/>
  <line x1="280" y1="232" x2="432" y2="232" stroke="#bbbbbb" stroke-width="4"/>
  <rect x="284" y="212" width="7" height="14" fill="#bbbbbb"/>
  <!-- Two horizontal lines in bottom 5th of bottom-left quadrant -->
  <line x1="80" y1="406" x2="232" y2="406" stroke="#bbbbbb" stroke-width="4"/>
  <line x1="80" y1="432" x2="232" y2="432" stroke="#bbbbbb" stroke-width="4"/>
  <rect x="84" y="412" width="7" height="14" fill="#bbbbbb"/>
  <!-- Two horizontal lines in bottom 5th of bottom-right quadrant -->
  <line x1="280" y1="406" x2="432" y2="406" stroke="#bbbbbb" stroke-width="4"/>
  <line x1="280" y1="432" x2="432" y2="432" stroke="#bbbbbb" stroke-width="4"/>
  <rect x="284" y="412" width="7" height="14" fill="#bbbbbb"/>
</svg>