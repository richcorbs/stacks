<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="prism1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="ray1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="33%" stop-color="#fb923c"/>
      <stop offset="66%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg1)"/>
  <!-- Prism triangle -->
  <polygon points="200,120 320,390 80,390" fill="url(#prism1)" opacity="0.9"/>
  <!-- Light beam entering -->
  <line x1="380" y1="160" x2="240" y2="260" stroke="#e2e8f0" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <!-- Spectrum rays exiting -->
  <line x1="180" y1="310" x2="60" y2="200" stroke="#f472b6" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <line x1="170" y1="330" x2="45" y2="260" stroke="#fb923c" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <line x1="160" y1="350" x2="40" y2="330" stroke="#facc15" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <line x1="155" y1="370" x2="45" y2="400" stroke="#34d399" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <!-- Subtle glow dots -->
  <circle cx="380" cy="160" r="12" fill="#e2e8f0" opacity="0.3"/>
  <!-- Small accent: "M" letterform hint at bottom right -->
  <text x="370" y="430" font-family="SF Pro Display, Helvetica Neue, sans-serif" font-weight="700" font-size="72" fill="#e2e8f0" opacity="0.15">M</text>
</svg>