<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#000000"/>
  <!-- 4 stacked diamonds, each offset down and slightly right, back to front -->
  <!-- Diamond 1 (furthest back, top) -->
  <polygon points="256,100 376,180 256,260 136,180" fill="#ffffff" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
  <!-- Diamond 2 -->
  <polygon points="266,145 386,225 266,305 146,225" fill="#ffffff" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
  <!-- Diamond 3 -->
  <polygon points="256,195 376,275 256,355 136,275" fill="#ffffff" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
  <!-- Diamond 4 (front, bottom) -->
  <polygon points="266,245 386,325 266,405 146,325" fill="#ffffff" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>
</svg>